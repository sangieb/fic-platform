{% load static %}
<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t.page_title }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'dashboard/css/fic.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="fic-navbar">
  <a href="/?lang={{ lang }}" class="fic-navbar__brand">
    📊 FIC Colombia
  </a>
  <div class="fic-navbar__actions">

    <div class="fic-lang-selector">
      <button class="fic-lang-selector__btn" onclick="toggleLangMenu()" id="langBtn">
        {% if lang == 'es' %}
          <img src="https://flagcdn.com/w20/co.png" alt="Colombia"> Español
        {% elif lang == 'en' %}
          <img src="https://flagcdn.com/w20/us.png" alt="English"> English
        {% elif lang == 'fr' %}
          <img src="https://flagcdn.com/w20/fr.png" alt="Français"> Français
        {% endif %}
        <span class="fic-lang-selector__arrow">▾</span>
      </button>
      <div class="fic-lang-selector__menu" id="langMenu">
        <a href="?lang=es&nombre={{ nombre }}"
           class="fic-lang-selector__item {% if lang == 'es' %}active{% endif %}">
          <img src="https://flagcdn.com/w20/co.png" alt="CO"> Español
        </a>
        <a href="?lang=en&nombre={{ nombre }}"
           class="fic-lang-selector__item {% if lang == 'en' %}active{% endif %}">
          <img src="https://flagcdn.com/w20/us.png" alt="US"> English
        </a>
        <a href="?lang=fr&nombre={{ nombre }}"
           class="fic-lang-selector__item {% if lang == 'fr' %}active{% endif %}">
          <img src="https://flagcdn.com/w20/fr.png" alt="FR"> Français
        </a>
      </div>
    </div>

    <a href="http://localhost:8080/api/reportes/pdf"
       class="btn-export btn-export--pdf" target="_blank">
      📄 {{ t.nav_exportar_pdf }}
    </a>
    <a href="http://localhost:8080/api/reportes/excel"
       class="btn-export btn-export--excel" target="_blank">
      📊 {{ t.nav_exportar_excel }}
    </a>
  </div>
</nav>

<main class="fic-main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block extra_js %}{% endblock %}
<script src="{% static 'dashboard/js/fic.js' %}"></script>
</body>
</html>
